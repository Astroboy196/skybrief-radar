server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow iframe embedding from vatbriefly.app
    add_header X-Frame-Options "ALLOW-FROM https://vatbriefly.app" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://vatbriefly.app https://*.vatbriefly.app http://localhost:*" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
