<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SkyBrief Radar V2</title>
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <style>
    /* Critical styles inline — must work before Tailwind loads */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e27; color: #fff; font-family: system-ui, sans-serif; }
    #app { position: relative; width: 100vw; height: 100vh; }
    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; }
    #ui-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 100; }
    #loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(79,140,255,0.2); border-top-color: #4f8cff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <div id="ui-overlay"></div>
    <div id="loading">
      <div class="spinner"></div>
      <div style="font-size: 13px; color: #8892b0;">Loading Radar...</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
